<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1410;
            background-image: radial-gradient(circle at 10% 20%, #2d221c, #0f0b09);
            min-height: 100vh;
            color: #f0e4d6;
            padding: 20px;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            background: linear-gradient(180deg, #2d1f16, #1a110d);
            border-radius: 60px 60px 30px 30px;
            border: 2px solid #b8863e;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: "☪";
            position: absolute;
            font-size: 120px;
            opacity: 0.06;
            right: -10px;
            top: -30px;
            transform: rotate(15deg);
        }
        .header h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 6px;
            color: #e8d5b8;
            text-shadow: 0 3px 0 #8a6a3e, 0 6px 20px rgba(0,0,0,0.5);
        }
        .header h1 small {
            font-size: 1.2rem;
            display: block;
            color: #c4a87c;
            letter-spacing: 4px;
            margin-top: 4px;
        }
        .header .sub {
            margin-top: 14px;
            font-size: 1rem;
            color: #b8946a;
            letter-spacing: 2px;
        }

        /* FILTRE */
        .filter-area {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 10px 0 35px;
        }
        .filter-area input,
        .filter-area select {
            padding: 12px 22px;
            border-radius: 60px;
            border: 2px solid #7a5f3f;
            background: #2d1f16;
            color: #f0e4d6;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            min-width: 160px;
        }
        .filter-area input::placeholder {
            color: #8a7a6a;
        }
        .filter-area input:focus,
        .filter-area select:focus {
            border-color: #c9a87c;
            box-shadow: 0 0 20px rgba(201, 168, 124, 0.15);
        }
        .filter-area select option {
            background: #1a1410;
        }
        .filter-area .stats-filter {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #c4a87c;
            font-weight: 600;
            padding: 0 10px;
        }

        /* KART GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* KART */
        .card {
            background: #251d17;
            border-radius: 28px;
            padding: 20px 18px 22px;
            border: 2px solid #6b513a;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 8px 0 #3d2d1f;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: #b8863e;
            box-shadow: 0 14px 0 #3d2d1f, 0 10px 40px rgba(0,0,0,0.6);
        }
        .card .number {
            position: absolute;
            top: 10px;
            right: 16px;
            font-size: 2.6rem;
            font-weight: 800;
            opacity: 0.1;
            color: #c9a87c;
        }
        .card .name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f0e4d6;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .card .title {
            font-size: 1rem;
            color: #c9a87c;
            font-weight: 400;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .card .period {
            font-size: 0.95rem;
            color: #b8946a;
            background: #1a110d;
            display: inline-block;
            padding: 2px 18px;
            border-radius: 60px;
            border: 1px solid #5f4732;
            margin: 6px 0 8px;
        }
        .card .short-info {
            font-size: 0.9rem;
            color: #c9b8a8;
            line-height: 1.5;
            margin-top: 8px;
            opacity: 0.8;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card .badge {
            display: inline-block;
            font-size: 0.7rem;
            padding: 3px 14px;
            border-radius: 60px;
            margin-top: 10px;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .card .badge.kurulus { background: #2d5a2a; color: #b8e0a8; }
        .card .badge.yukselme { background: #8b2a2a; color: #f0b8b8; }
        .card .badge.duraklama { background: #8a6a1a; color: #f0d8a0; }
        .card .badge.gerileme { background: #7a5a2a; color: #f0d8b0; }
        .card .badge.dagilma { background: #3a2a5a; color: #c8b0e8; }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #251d17;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 40px;
            padding: 40px 38px;
            border: 2px solid #b8863e;
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
            position: relative;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal .close {
            position: sticky;
            top: 0;
            float: right;
            background: #3d2d1f;
            border: none;
            color: #f0e4d6;
            font-size: 2rem;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .modal .close:hover {
            background: #5f3d2a;
            transform: rotate(90deg);
        }
        .modal .m-name {
            font-size: 2.8rem;
            font-weight: 700;
            color: #f0e4d6;
            letter-spacing: 2px;
        }
        .modal .m-title {
            font-size: 1.2rem;
            color: #c9a87c;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .modal .m-period {
            font-size: 1rem;
            color: #b8946a;
            background: #1a110d;
            display: inline-block;
            padding: 4px 24px;
            border-radius: 60px;
            border: 1px solid #5f4732;
            margin: 6px 0 16px;
        }
        .modal .m-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 24px;
            margin: 18px 0 16px;
            padding: 16px;
            background: #1a1410;
            border-radius: 20px;
            border: 1px solid #3d2d1f;
        }
        .modal .m-detail .item {
            color: #c9b8a8;
            font-size: 0.95rem;
        }
        .modal .m-detail .item strong {
            color: #c9a87c;
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .modal .m-desc {
            color: #d8ccbf;
            line-height: 1.8;
            font-size: 1.02rem;
            margin: 12px 0 8px;
        }
        .modal .m-desc strong {
            color: #c9a87c;
        }
        .modal .m-events {
            background: #1a1410;
            padding: 14px 20px;
            border-radius: 16px;
            border-left: 4px solid #b8863e;
            margin: 12px 0;
            color: #d8ccbf;
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .modal .m-events strong {
            color: #e8d5b8;
        }

        .modal::-webkit-scrollbar {
            width: 6px;
        }
        .modal::-webkit-scrollbar-track {
            background: #1a1410;
            border-radius: 10px;
        }
        .modal::-webkit-scrollbar-thumb {
            background: #7a5f3f;
            border-radius: 10px;
        }

        .no-result {
            text-align: center;
            font-size: 1.4rem;
            color: #7a6a5a;
            padding: 60px 0;
            grid-column: 1 / -1;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: #6b5a4a;
            border-top: 1px solid #3d2d1f;
            letter-spacing: 2px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 2.2rem; }
            .filter-area input,
            .filter-area select { min-width: 120px; width: 100%; }
            .modal { padding: 24px 18px; }
            .modal .m-detail { grid-template-columns: 1fr; }
            .modal .m-name { font-size: 2rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>

        // ============================================================
        // DOM REFS
        // ============================================================
        const grid = document.getElementById('gridContainer');
        const searchInput = document.getElementById('searchInput');
        const centuryFilter = document.getElementById('centuryFilter');
        const periodFilter = document.getElementById('periodFilter');
        const resultCount = document.getElementById('resultCount');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalBody = document.getElementById('modalBody');
        const modalClose = document.getElementById('modalClose');

        // ============================================================
        // RENDER KARTLAR
        // ============================================================
        function renderCards(filteredSultans) {
            if (filteredSultans.length === 0) {
                grid.innerHTML = `<div class="no-result">⏳ Bu kriterlere uygun padişah bulunamadı.</div>`;
                resultCount.textContent = '0';
                return;
            }

            let html = '';
            filteredSultans.forEach(s => {
                const badgeClass = s.periodType;
                const badgeLabel = {
                    kurulus: 'Kuruluş',
                    yukselme: 'Yükselme',
                    duraklama: 'Duraklama',
                    gerileme: 'Gerileme',
                    dagilma: 'Dağılma'
                } [s.periodType] || '';

                html += `
                    <div class="card" style="border-color: ${s.color}" data-id="${s.id}">
                        <div class="number">${s.id}</div>
                        <div class="name">${s.name}</div>
                        <div class="title">${s.title}</div>
                        <div class="period">${s.period}</div>
                        <div class="short-info">${s.achievements.slice(0, 100)}...</div>
                        <span class="badge ${badgeClass}">${badgeLabel}</span>
                    </div>
                `;
            });

            grid.innerHTML = html;
            resultCount.textContent = filteredSultans.length;

            // Kartlara tıklama
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const id = parseInt(card.dataset.id);
                    const sultan = SULTANS.find(s => s.id === id);
                    if (sultan) openModal(sultan);
                });
            });
        }

        // ============================================================
        // FILTRELEME
        // ============================================================
        function filterSultans() {
            const search = searchInput.value.toLowerCase().trim();
            const century = centuryFilter.value;
            const period = periodFilter.value;

            let filtered = SULTANS.filter(s => {
                // Arama
                if (search) {
                    const match = s.name.toLowerCase().includes(search) ||
                                  s.title.toLowerCase().includes(search) ||
                                  s.achievements.toLowerCase().includes(search) ||
                                  s.events.toLowerCase().includes(search);
                    if (!match) return false;
                }

                // Yüzyıl
                if (century !== 'all') {
                    if (!s.century.includes(century)) return false;
                }

                // Dönem
                if (period !== 'all') {
                    if (s.periodType !== period) return false;
                }

                return true;
            });

            renderCards(filtered);
        }

        // ============================================================
        // MODAL
        // ============================================================
        function openModal(s) {
            const badgeLabel = {
                kurulus: 'Kuruluş',
                yukselme: 'Yükselme',
                duraklama: 'Duraklama',
                gerileme: 'Gerileme',
                dagilma: 'Dağılma'
            } [s.periodType] || '';

            modalBody.innerHTML = `
                <div class="m-name" style="color: ${s.color}">${s.name}</div>
                <div class="m-title">${s.title}</div>
                <div class="m-period">${s.period} · ${badgeLabel}</div>

                <div class="m-detail">
                    <div class="item"><strong>Doğum</strong>${s.birth}</div>
                    <div class="item"><strong>Ölüm</strong>${s.death}</div>
                    <div class="item"><strong>Babası</strong>${s.father}</div>
                    <div class="item"><strong>Annesi</strong>${s.mother}</div>
                </div>

                <div class="m-desc">
                    <strong>🏴 Başarıları</strong><br />
                    ${s.achievements}
                </div>

                <div class="m-events">
                    <strong>📜 Önemli Olaylar</strong><br />
                    ${s.events}
                </div>

                <div class="m-desc">
                    <strong>🏛️ Eserleri</strong><br />
                    ${s.works}
                </div>
            `;

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ============================================================
        // EVENTLER
        // ============================================================
        searchInput.addEventListener('input', filterSultans);
        centuryFilter.addEventListener('change', filterSultans);
        periodFilter.addEventListener('change', filterSultans);
        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // ============================================================
        // BASLAT
        // ============================================================
        renderCards(SULTANS);
    </script>
